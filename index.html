<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://esm.sh https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.firebase.com wss://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com; img-src 'self' data: blob: https:; frame-src 'self' blob:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SEC RMS SYSTEM | ระบบติดตามสถานะและลงทะเบียนเคลมสินค้า</title>
  <meta name="description"
    content="SEC RMS SYSTEM - The simplest way to track RMA status, register claims, and manage your warranty." />
  <meta name="theme-color" content="#0071e3">
  <link rel="apple-touch-icon" href="/pwa-icon-v5-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-v5-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icon-v5-512x512.png">
  <link rel="manifest" href="/manifest.webmanifest?v=5">

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Prompt', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: { blue: '#0071e3', dark: '#1d1d1f' }
          }
        }
      }
    }
  </script>
  <style>
    /* ===== CSS Custom Properties — hoverstat.es-inspired theming ===== */
    :root {
      --bg-primary: #f5f5f7;
      --bg-secondary: #eef0f5;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-hover: rgba(255, 255, 255, 0.95);
      --border: rgba(0, 0, 0, 0.05);
      --border-hover: rgba(0, 113, 227, 0.25);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 32px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08), 0 16px 48px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --transition-smooth: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dark {
      --bg-primary: #131314;
      --bg-secondary: #1e1e1f;
      --text-primary: #e3e3e3;
      --text-secondary: #c4c7c5;
      --surface: #1e1e1f;
      --surface-hover: #282a2c;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(0, 113, 227, 0.45);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25), 0 4px 16px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3), 0 8px 32px rgba(0, 0, 0, 0.24);
      --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.35), 0 16px 48px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.45);
    }

    html, body {
      overflow-x: hidden;
      max-width: 100vw;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color var(--transition-smooth), color var(--transition-smooth);
      margin: 0;
    }

    .dark body {
      background-color: #131314;
      color: #e3e3e3;
    }

    /* ===== Glass Panel — hoverstat.es-inspired translucency ===== */
    .glass-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition-smooth), transform var(--transition-smooth), border-color var(--transition-smooth);
    }

    /* Disable heavy backdrop blurs on mobile devices to solve scroll lag issues */
    @media (min-width: 769px) {
      .glass-panel {
        backdrop-filter: blur(24px) saturate(1.6);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
      }
    }

    .glass-panel:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-hover);
    }

    .dark .glass-panel {
      background: #1e1e1f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-sm);
    }

    .dark .glass-panel:hover {
      background: #282a2c;
      box-shadow: var(--shadow-md);
    }

    /* Soft shadow for ALL white cards */
    .bg-white {
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 2px 8px rgba(0, 0, 0, 0.025);
    }
    .dark .bg-white { box-shadow: none; }

    /* Fix Thai Vowel Clipping */
    button,
    input,
    select,
    textarea,
    .whitespace-nowrap {
      line-height: 1.5 !important;
    }

    /* Hide scrollbar utility */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    /* ===== Animations — hoverstat.es-inspired smooth entrances ===== */
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes gentle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .animate-fade-in {
      animation: fade-in 0.25s ease-out;
    }

    .animate-slide-up {
      animation: slide-up 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .animate-scale-in {
      animation: scale-in 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Extreme Performance Mode Overrides */
    html.performance-mode * {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      transition: none !important;
      animation: none !important;
    }

    html.performance-mode .bg-black\/50,
    html.performance-mode .bg-black\/60,
    html.performance-mode .bg-white\/50 {
      background-color: rgba(0, 0, 0, 0.9) !important;
      box-shadow: none !important;
    }

    html.performance-mode main,
    html.performance-mode div,
    html.performance-mode span {
      --tw-backdrop-blur: blur(0) !important;
    }

    /* ===== Mobile UX Enhancements ===== */
    @media (max-width: 768px) {
      button, a, input, select, textarea {
        min-height: 44px;
      }

      .rounded-\[2rem\] { border-radius: 1.25rem !important; }
      .rounded-\[2\.5rem\] { border-radius: 1.25rem !important; }
      .rounded-\[3rem\] { border-radius: 1.5rem !important; }

      /* Smooth touch feedback — hoverstat.es-inspired press */
      button:active, a:active {
        transform: scale(0.97);
        transition: transform 0.1s ease;
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      h1 { font-size: 1.5rem !important; }

      main, .overflow-y-auto {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: auto !important;
      }

      /* Disable heavy backdrop blurs on mobile viewports for smooth scrolling performance */
      .backdrop-blur-sm, .backdrop-blur-md, .backdrop-blur-xl, .backdrop-blur-2xl, .backdrop-blur {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      /* Keep beautiful glassmorphism on the floating navigation bars because they are small and critical for readability */
      .nav-glass {
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        background-color: rgba(255, 255, 255, 0.88) !important;
      }
      .dark .nav-glass {
        background-color: rgba(26, 26, 30, 0.88) !important;
      }

      /* Disable layout-thrashing entry animations on mobile viewports to speed up page loads */
      .space-y-4 > div, .space-y-8 > div,
      .space-y-3 > div, .space-y-6 > div {
        animation: none !important;
      }

      /* Global Responsive Styling Overrides for Mobile Screens */
      .glass-panel, .p-8 {
        padding: 1.25rem !important; /* 20px instead of 32px */
      }
      .p-10 {
        padding: 1.5rem !important; /* 24px */
      }
      .gap-8 {
        gap: 1rem !important;
      }
      .mb-8, .mb-10, .mb-12 {
        margin-bottom: 1.25rem !important;
      }
      .space-y-8 > :not([hidden]) ~ :not([hidden]) {
        margin-top: 1.25rem !important;
      }
      .space-y-6 > :not([hidden]) ~ :not([hidden]) {
        margin-top: 1rem !important;
      }
    }

    /* Touch-friendly card press effect */
    @media (hover: none) {
      .hover\:shadow-md:active {
        box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
        transform: scale(0.98);
        transition: all 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
    }

    /* Premium glassmorphism for translucent surfaces */
    .backdrop-blur-sm, .backdrop-blur-md, .backdrop-blur-xl {
      -webkit-backdrop-filter: var(--tw-backdrop-blur) var(--tw-backdrop-brightness) var(--tw-backdrop-contrast) var(--tw-backdrop-grayscale) var(--tw-backdrop-hue-rotate) var(--tw-backdrop-invert) var(--tw-backdrop-opacity) var(--tw-backdrop-saturate) var(--tw-backdrop-sepia);
    }

    /* Status filter pill animation */
    @media (max-width: 768px) {
      .rounded-lg, .rounded-xl {
        transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
    }

    /* ===== hoverstat.es-inspired staggered card entrance ===== */
    @keyframes card-appear {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .space-y-4 > div, .space-y-8 > div,
    .space-y-3 > div, .space-y-6 > div {
      animation: card-appear 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .space-y-4 > div:nth-child(2), .space-y-3 > div:nth-child(2) { animation-delay: 0.04s; }
    .space-y-4 > div:nth-child(3), .space-y-3 > div:nth-child(3) { animation-delay: 0.08s; }
    .space-y-4 > div:nth-child(4), .space-y-3 > div:nth-child(4) { animation-delay: 0.12s; }
    .space-y-4 > div:nth-child(5), .space-y-3 > div:nth-child(5) { animation-delay: 0.16s; }
    .space-y-4 > div:nth-child(6), .space-y-3 > div:nth-child(6) { animation-delay: 0.20s; }
    .space-y-4 > div:nth-child(7), .space-y-3 > div:nth-child(7) { animation-delay: 0.24s; }
    .space-y-4 > div:nth-child(8), .space-y-3 > div:nth-child(8) { animation-delay: 0.28s; }

    /* ===== hoverstat.es-inspired hover transform on interactive cards ===== */
    @media (hover: hover) {
      [data-hover-card] {
        transition: transform var(--transition-smooth), box-shadow var(--transition-smooth), border-color var(--transition-smooth);
      }
      [data-hover-card]:hover {
        transform: translateY(-2px) scale(1.005);
        box-shadow: var(--shadow-hover) !important;
      }
      [data-hover-card]:active {
        transform: translateY(0) scale(0.995);
        transition-duration: 0.1s;
      }
    }

    /* ===== Custom scrollbar (subtle, hoverstat.es-like) ===== */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 10em;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.22);
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    /* ===== Apple Premium Fluid Transitions (GPU-Accelerated) ===== */
    .apple-fluid-transition {
      transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  width 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  border-radius 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  padding 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: height, width, border-radius, bottom, transform;
    }
    .apple-fluid-item {
      transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  margin 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform, max-height;
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
